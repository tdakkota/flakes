name: Bump versions

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Check upstream feeds and patch flake.nix
        working-directory: tools/bump
        run: go run . -flake ../../flake.nix -write

      - name: Format flake.nix
        run: nix run nixpkgs#nixfmt -- flake.nix

      - name: Regenerate PKGBUILDs
        run: nix run .#gen-pkgbuilds

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump pinned CLI versions"
          title: "chore: bump pinned CLI versions"
          body: |
            Automated version/hash bump, generated by `tools/bump`
            (`go run . -flake flake.nix -write`) from each package's
            upstream release feed.

            Review the diff before merging - this pulls binaries from
            third-party download endpoints.
          branch: auto/bump-versions
          delete-branch: true
          add-paths: |
            flake.nix
            pkgbuilds/
